<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互动剧场</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .video-container { position: relative; width: 100vw; height: 100vh; background: #000; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; display: none; }
        #videoStart { display: block; }
        .interactive-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: none; flex-direction: column; justify-content: center; align-items: center; gap: 20px; z-index: 999; }
        .choice-btn { width: 280px; padding: 18px; font-size: 18px; color: #fff; background: #2f3542; border: 2px solid #57606f; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div class="video-container">
    <video id="videoStart" playsinline controls muted autoplay preload="auto">
        <source src="1.mov" type="video/mp4">
        <source src="1.MOV" type="video/mp4">
    </video>
    
    <video id="videoFail" playsinline controls muted preload="auto">
        <source src="2.mov" type="video/mp4">
        <source src="2.MOV" type="video/mp4">
    </video>
    
    <video id="videoStudy" playsinline controls muted preload="auto">
        <source src="3.mov" type="video/mp4">
        <source src="3.MOV" type="video/mp4">
    </video>

    <div id="interactiveOverlay" class="interactive-overlay">
        <div style="font-size:24px; margin-bottom:20px; font-weight:bold;">⏰ 30秒过去了，你打算怎么办？</div>
        <button class="choice-btn" onclick="makeChoice('fail')">继续趴着睡觉（逃课）</button>
        <button class="choice-btn" onclick="makeChoice('study')">立刻起床去教室上课</button>
    </div>
</div>

<script>
    const vStart = document.getElementById('videoStart');
    const vFail = document.getElementById('videoFail');
    const vStudy = document.getElementById('videoStudy');
    const overlay = document.getElementById('interactiveOverlay');

    // 28秒自动暂停并弹窗
    vStart.addEventListener('timeupdate', () => {
        if (vStart.currentTime >= 28) {
            vStart.pause();
            overlay.style.display = 'flex';
        }
    });

    function makeChoice(path) {
        overlay.style.display = 'none';
        vStart.style.display = 'none';
        if (path === 'fail') { vFail.style.display = 'block'; vFail.play(); }
        else if (path === 'study') { vStudy.style.display = 'block'; vStudy.play(); }
    }
</script>
</body>
</html>
